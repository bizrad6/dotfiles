# =============================================================================
# ~/.tmux.conf
# =============================================================================

# ----------- Prefix ----------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----------- General ---------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g mouse on

# ----------- Window / pane index starts at 1 ---------------------------------
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ----------- Reload config ---------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ----------- Splits ----------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ----------- Pane navigation (Vim-style) ------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ----------- Resize panes ----------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------- Copy mode (vi) --------------------------------------------------
set-window-option -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ----------- Status bar ------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour136"
set -g status-left  "#[fg=colour166,bold] #S #[fg=colour235]│ "
set -g status-right "#[fg=colour166]%Y-%m-%d #[fg=colour235]│#[fg=colour136] %H:%M "
set -g status-left-length  30
set -g status-right-length 40

set-window-option -g window-status-current-style "fg=colour166,bold"
set-window-option -g window-status-current-format " #I:#W "
set-window-option -g window-status-format " #I:#W "

# ----------- Pane borders ----------------------------------------------------
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour166"
